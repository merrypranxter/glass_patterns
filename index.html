<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass Patterns — Global Form from Randomness</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #ui {
      position: fixed; top: 0; right: 0; width: 228px;
      background: rgba(0,0,0,0.82); backdrop-filter: blur(8px);
      border-left: 1px solid rgba(255,255,255,0.06);
      padding: 13px; color: rgba(255,255,255,0.8);
      font-size: 11px; line-height: 1.65; z-index: 10;
      user-select: none;
    }
    h2 { font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(255,255,255,0.26); margin-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 7px; }
    .slbl { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.2); margin: 10px 0 5px; }
    .param { margin-bottom: 6px; }
    .param label { display: flex; justify-content: space-between; margin-bottom: 2px;
      color: rgba(255,255,255,0.55); }
    .param label span { color: rgba(255,255,255,0.28); font-variant-numeric: tabular-nums; }
    input[type=range] { width: 100%; height: 2px; -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,0.1); outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 9px; height: 9px;
      border-radius: 50%; background: rgba(255,255,255,0.65); cursor: pointer; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; margin-top: 3px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; margin-top: 3px; }
    .btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.4); padding: 5px 3px; font-size: 9px;
      cursor: pointer; transition: all 0.1s; font-family: inherit; line-height: 1.3;
      letter-spacing: 0.04em; }
    .btn:hover { background: rgba(255,255,255,0.09); color: #fff; }
    .btn.active { background: rgba(255,255,255,0.11); border-color: rgba(255,255,255,0.26); color: #fff; }
    .fps { position: fixed; bottom: 8px; left: 8px; font-size: 9px;
      color: rgba(255,255,255,0.15); z-index: 10; }
    #tagline { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
      font-size: 9px; color: rgba(255,255,255,0.12); letter-spacing: 0.09em;
      white-space: nowrap; z-index: 10; }
    #detect-hint { font-size: 9px; color: rgba(160,255,160,0.4); margin-top: 5px; min-height: 13px; }
  </style>
</head>
<body>
  <canvas id="gl"></canvas>
  <div id="ui">
    <h2>Glass Patterns</h2>

    <div class="slbl">Transform</div>
    <div class="grid3">
      <button class="btn active" data-xf="rotation">rotation</button>
      <button class="btn" data-xf="scaling">scaling</button>
      <button class="btn" data-xf="radial">radial</button>
      <button class="btn" data-xf="concentric">concentric</button>
      <button class="btn" data-xf="translation">translate</button>
      <button class="btn" data-xf="mixed">mixed</button>
    </div>

    <div class="slbl">Dot Field</div>
    <div class="param">
      <label>dot count <span id="v-dot_count">400</span></label>
      <input type="range" id="dot_count" min="50" max="800" step="10" value="400">
    </div>
    <div class="param">
      <label>dot radius <span id="v-dot_radius">2.5</span></label>
      <input type="range" id="dot_radius" min="0.5" max="8" step="0.5" value="2.5">
    </div>
    <div class="param">
      <label>correlation <span id="v-correlation">0.50</span></label>
      <input type="range" id="correlation" min="0" max="1" step="0.01" value="0.5">
    </div>
    <div id="detect-hint">global form detectable</div>

    <div class="slbl">Transform Params</div>
    <div class="param">
      <label>strength <span id="v-strength">0.30</span></label>
      <input type="range" id="strength" min="0" max="1" step="0.01" value="0.3">
    </div>
    <div class="param">
      <label>angle / scale <span id="v-angle">0.15</span></label>
      <input type="range" id="angle" min="-1" max="1" step="0.01" value="0.15">
    </div>

    <div class="slbl">Display</div>
    <div class="param">
      <label>animate <span id="v-animate">off</span></label>
      <input type="range" id="animate" min="0" max="1" step="1" value="0">
    </div>
    <div class="param">
      <label>anim speed <span id="v-anim_speed">0.20</span></label>
      <input type="range" id="anim_speed" min="0.01" max="2" step="0.01" value="0.2">
    </div>
    <div class="param">
      <label>single field <span id="v-single_field">off</span></label>
      <input type="range" id="single_field" min="0" max="1" step="1" value="0">
    </div>
    <div class="grid2">
      <button class="btn" id="btn-reseed">reseed</button>
      <button class="btn" id="btn-snapshot">snapshot</button>
    </div>

    <div class="slbl">Color</div>
    <div class="param">
      <label>ref color <span id="v-ref_hue">0</span>°</label>
      <input type="range" id="ref_hue" min="0" max="360" step="1" value="0">
    </div>
    <div class="param">
      <label>xf color <span id="v-xf_hue">200</span>°</label>
      <input type="range" id="xf_hue" min="0" max="360" step="1" value="200">
    </div>
    <div class="param">
      <label>mix mode <span id="v-color_mix">0.50</span></label>
      <input type="range" id="color_mix" min="0" max="1" step="0.01" value="0.5">
    </div>

    <div class="slbl">Keys</div>
    <div style="font-size:9px;color:rgba(255,255,255,0.18);line-height:2">
      <span style="color:rgba(255,255,255,0.32)">SPC</span> cycle xf &nbsp;
      <span style="color:rgba(255,255,255,0.32)">+/-</span> density &nbsp;
      <span style="color:rgba(255,255,255,0.32)">↑↓</span> strength<br>
      <span style="color:rgba(255,255,255,0.32)">A</span> animate &nbsp;
      <span style="color:rgba(255,255,255,0.32)">S</span> single field &nbsp;
      <span style="color:rgba(255,255,255,0.32)">R</span> reseed
    </div>
  </div>

  <div class="fps" id="fps">-- fps</div>
  <div id="tagline">two fields · one transformed · global form from randomness</div>

  <script type="module" src="src/js/main.js"></script>
</body>
</html>
